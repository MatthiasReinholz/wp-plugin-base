name: finalize-release

on:
  pull_request_target:
    types:
      - closed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

concurrency:
  group: finalize-release-${{ github.repository }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish merged release
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (startsWith(github.event.pull_request.head.ref, 'release/') || startsWith(github.event.pull_request.head.ref, 'hotfix/'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      attestations: write
      id-token: write

    environment: __PRODUCTION_ENVIRONMENT__
    env:
      WP_ORG_DEPLOY_ENABLED: ${{ vars.WP_ORG_DEPLOY_ENABLED }}
      WOOCOMMERCE_COM_DEPLOY_ENABLED: ${{ vars.WOOCOMMERCE_COM_DEPLOY_ENABLED }}

    steps:
      - name: Derive release version
        id: release
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [[ "$HEAD_REF" =~ ^(release|hotfix)/([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "version=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Unsupported release branch: $HEAD_REF" >&2
          exit 1

      - name: Checkout protected default branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main
          fetch-depth: 0

      - name: Verify merged commit is reachable from main
        env:
          EXPECTED_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          git fetch --unshallow origin main || git fetch origin main
          if ! git merge-base --is-ancestor "$EXPECTED_COMMIT" origin/main; then
            echo "Merged commit $EXPECTED_COMMIT is not reachable from origin/main." >&2
            exit 1
          fi
          git checkout --detach "$EXPECTED_COMMIT"

      - name: Read config
        id: config
        shell: bash
        run: bash .wp-plugin-base/scripts/ci/write_config_outputs.sh project ".wp-plugin-base.env" "$GITHUB_OUTPUT"

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: ${{ steps.config.outputs.php_version }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ steps.config.outputs.node_version }}

      - name: Validate WordPress readiness
        if: ${{ steps.config.outputs.wordpress_readiness_enabled == 'true' }}
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          GH_TOKEN: ${{ github.token }}
          WP_PLUGIN_BASE_STRICT_DEPLOY_ENV_PROTECTION: 'true'
          WP_ORG_DEPLOY_ENABLED: ${{ env.WP_ORG_DEPLOY_ENABLED }}
        run: bash .wp-plugin-base/scripts/ci/validate_wordpress_readiness.sh ".wp-plugin-base.env" "$BRANCH_NAME"

      - name: Validate metadata versions
        if: ${{ steps.config.outputs.wordpress_readiness_enabled != 'true' }}
        run: bash .wp-plugin-base/scripts/ci/check_versions.sh "${{ steps.release.outputs.version }}"

      - name: Lint PHP
        if: ${{ steps.config.outputs.wordpress_readiness_enabled != 'true' }}
        run: bash .wp-plugin-base/scripts/ci/lint_php.sh

      - name: Lint JavaScript
        if: ${{ steps.config.outputs.wordpress_readiness_enabled != 'true' }}
        run: bash .wp-plugin-base/scripts/ci/lint_js.sh

      - name: Build package
        if: ${{ steps.config.outputs.wordpress_readiness_enabled != 'true' }}
        run: bash .wp-plugin-base/scripts/ci/build_zip.sh

      - name: Generate GitHub release body
        run: bash .wp-plugin-base/scripts/release/generate_github_release_body.sh "${{ steps.release.outputs.version }}" > dist/release-body.md

      - name: Install SBOM and signing tools
        run: |
          bash .wp-plugin-base/scripts/release/install_release_security_tools.sh "$RUNNER_TEMP/wp-plugin-base-release-tools"
          echo "$RUNNER_TEMP/wp-plugin-base-release-tools" >> "$GITHUB_PATH"

      - name: Generate package SBOM
        run: |
          bash .wp-plugin-base/scripts/release/generate_sbom.sh \
            "dist/package/${{ steps.config.outputs.plugin_slug }}" \
            "dist/${{ steps.config.outputs.zip_file }}.sbom.cdx.json"

      - name: Sign release package
        run: |
          bash .wp-plugin-base/scripts/release/sign_release.sh \
            "dist/${{ steps.config.outputs.zip_file }}" \
            "dist/${{ steps.config.outputs.zip_file }}.sigstore.json"

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ steps.config.outputs.plugin_slug }}-${{ steps.release.outputs.version }}
          path: dist/${{ steps.config.outputs.zip_file }}
          if-no-files-found: error

      - name: Attest package provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist/${{ steps.config.outputs.zip_file }}

      - name: Validate WordPress.org deploy configuration
        if: ${{ env.WP_ORG_DEPLOY_ENABLED == 'true' }}
        run: bash .wp-plugin-base/scripts/release/validate_wordpress_org_deploy.sh "${{ steps.release.outputs.version }}" ".wp-plugin-base.env" "dist/package/${{ steps.config.outputs.plugin_slug }}"

      - name: Validate WooCommerce.com deploy configuration
        if: ${{ env.WOOCOMMERCE_COM_DEPLOY_ENABLED == 'true' }}
        env:
          WOO_COM_USERNAME: ${{ secrets.WOO_COM_USERNAME }}
          WOO_COM_APP_PASSWORD: ${{ secrets.WOO_COM_APP_PASSWORD }}
        run: bash .wp-plugin-base/scripts/release/validate_woocommerce_com_deploy.sh "${{ steps.release.outputs.version }}" ".wp-plugin-base.env" "dist/package/${{ steps.config.outputs.plugin_slug }}"

      - name: Inspect release tag state
        id: tag
        env:
          VERSION: ${{ steps.release.outputs.version }}
          EXPECTED_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          git fetch --tags origin
          if ! git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$(git cat-file -t "refs/tags/${VERSION}")" != "tag" ]; then
            echo "Tag ${VERSION} already exists but is not an annotated tag." >&2
            exit 1
          fi

          tag_commit="$(git rev-list -n 1 "${VERSION}")"
          if [ "$tag_commit" != "$EXPECTED_COMMIT" ]; then
            echo "Tag ${VERSION} already exists on ${tag_commit}, expected ${EXPECTED_COMMIT}." >&2
            exit 1
          fi

          echo "exists=true" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create annotated tag locally
        if: ${{ steps.tag.outputs.exists != 'true' }}
        run: git -c tag.gpgsign=false tag -a "${{ steps.release.outputs.version }}" -m "Release ${{ steps.release.outputs.version }}"

      - name: Push tag
        if: ${{ steps.tag.outputs.exists != 'true' }}
        run: git push origin "${{ steps.release.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          repair_args=()
          if [ "${{ steps.tag.outputs.exists }}" = "true" ]; then
            repair_args+=(--repair)
          fi
          bash .wp-plugin-base/scripts/release/publish_github_release.sh \
            --mark-latest \
            "${repair_args[@]}" \
            "${{ steps.release.outputs.version }}" \
            "${{ steps.release.outputs.version }}" \
            dist/release-body.md \
            "dist/${{ steps.config.outputs.zip_file }}" \
            "dist/${{ steps.config.outputs.zip_file }}.sbom.cdx.json" \
            "dist/${{ steps.config.outputs.zip_file }}.sigstore.json"

      - name: Verify GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
          ZIP_FILE: ${{ steps.config.outputs.zip_file }}
        run: |
          set -euo pipefail
          bash .wp-plugin-base/scripts/release/verify_github_release_assets.sh \
            "$VERSION" \
            false \
            "dist/${ZIP_FILE}" \
            "dist/${ZIP_FILE}.sbom.cdx.json" \
            "dist/${ZIP_FILE}.sigstore.json"

      - name: Install Subversion (post-publish)
        if: ${{ env.WP_ORG_DEPLOY_ENABLED == 'true' }}
        continue-on-error: true
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Deploy to WordPress.org (post-publish)
        id: deploy_wporg_post_publish
        if: ${{ env.WP_ORG_DEPLOY_ENABLED == 'true' }}
        continue-on-error: true
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
        run: |
          bash .wp-plugin-base/scripts/release/deploy_wordpress_org.sh \
            "${{ steps.release.outputs.version }}" \
            ".wp-plugin-base.env" \
            "dist/package/${{ steps.config.outputs.plugin_slug }}"

      - name: Deploy to WooCommerce.com Marketplace (post-publish)
        id: deploy_woocommerce_post_publish
        if: ${{ env.WOOCOMMERCE_COM_DEPLOY_ENABLED == 'true' && steps.config.outputs.woocommerce_com_product_id != '' }}
        continue-on-error: true
        env:
          WOO_COM_USERNAME: ${{ secrets.WOO_COM_USERNAME }}
          WOO_COM_APP_PASSWORD: ${{ secrets.WOO_COM_APP_PASSWORD }}
        run: |
          bash .wp-plugin-base/scripts/release/deploy_woocommerce_com.sh \
            "${{ steps.release.outputs.version }}" \
            ".wp-plugin-base.env" \
            "dist/${{ steps.config.outputs.zip_file }}"

      - name: Summarize channel deployment results
        if: ${{ always() }}
        id: channel_summary
        env:
          WP_ORG_DEPLOY_ENABLED: ${{ env.WP_ORG_DEPLOY_ENABLED }}
          WOOCOMMERCE_COM_DEPLOY_ENABLED: ${{ env.WOOCOMMERCE_COM_DEPLOY_ENABLED }}
          WPORG_POST_OUTCOME: ${{ steps.deploy_wporg_post_publish.outcome }}
          WOO_POST_OUTCOME: ${{ steps.deploy_woocommerce_post_publish.outcome }}
        run: |
          set -euo pipefail

          wporg_outcome="${WPORG_POST_OUTCOME:-skipped}"
          if [ "${WP_ORG_DEPLOY_ENABLED:-false}" != 'true' ]; then
            wporg_outcome='disabled'
          fi

          woo_outcome="${WOO_POST_OUTCOME:-skipped}"
          if [ "${WOOCOMMERCE_COM_DEPLOY_ENABLED:-false}" != 'true' ]; then
            woo_outcome='disabled'
          fi

          failed_channels=0
          if [ "$wporg_outcome" = 'failure' ]; then
            failed_channels=$((failed_channels + 1))
          fi
          if [ "$woo_outcome" = 'failure' ]; then
            failed_channels=$((failed_channels + 1))
          fi

          echo "failed_channels=${failed_channels}" >> "$GITHUB_OUTPUT"

          {
            echo "### Distribution Channel Summary"
            echo
            echo "- WordPress.org: ${wporg_outcome}"
            echo "- WooCommerce.com: ${woo_outcome}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce channel deployment success
        if: ${{ always() && steps.channel_summary.outputs.failed_channels != '0' }}
        run: |
          echo "One or more enabled distribution channels failed after GitHub release publication."
          echo "Use the manual release repair workflow and WooCommerce status workflow to complete channel repair."
          exit 1

      - name: Trigger GlotPress import
        if: ${{ steps.channel_summary.outputs.failed_channels == '0' && steps.config.outputs.glotpress_trigger_enabled == 'true' && steps.tag.outputs.exists != 'true' }}
        env:
          GLOTPRESS_TOKEN: ${{ secrets.GLOTPRESS_TOKEN }}
        run: |
          bash .wp-plugin-base/scripts/release/trigger_glotpress_import.sh \
            "${{ steps.release.outputs.version }}" \
            ".wp-plugin-base.env"

      - name: Send deployment notification
        if: ${{ steps.channel_summary.outputs.failed_channels == '0' && steps.config.outputs.deploy_notification_enabled == 'true' && steps.tag.outputs.exists != 'true' }}
        env:
          DEPLOY_NOTIFICATION_WEBHOOK_URL: ${{ secrets.DEPLOY_NOTIFICATION_WEBHOOK_URL }}
        run: |
          bash .wp-plugin-base/scripts/release/send_deploy_notification.sh \
            "${{ steps.release.outputs.version }}" \
            ".wp-plugin-base.env"
