name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      plugin_slug: ${{ steps.config.outputs.plugin_slug }}
      zip_file: ${{ steps.config.outputs.zip_file }}
      php_version: ${{ steps.config.outputs.php_version }}
      node_version: ${{ steps.config.outputs.node_version }}
      wordpress_readiness_enabled: ${{ steps.config.outputs.wordpress_readiness_enabled }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Read config
        id: config
        shell: bash
        run: bash .wp-plugin-base/scripts/ci/write_config_outputs.sh project ".wp-plugin-base.env" "$GITHUB_OUTPUT"

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: ${{ steps.config.outputs.php_version }}

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ steps.config.outputs.node_version }}

      - name: Validate repository
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: bash .wp-plugin-base/scripts/ci/validate_project.sh ".wp-plugin-base.env" "$BRANCH_NAME"

      - name: Upload package artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ steps.config.outputs.plugin_slug }}-package
          path: dist/${{ steps.config.outputs.zip_file }}
          if-no-files-found: error

  wordpress-readiness:
    name: WordPress readiness
    if: ${{ needs.validate.outputs.wordpress_readiness_enabled == 'true' }}
    needs:
      - validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: ${{ needs.validate.outputs.php_version }}

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ needs.validate.outputs.node_version }}

      - name: Validate WordPress readiness
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          WP_ORG_DEPLOY_ENABLED: ${{ vars.WP_ORG_DEPLOY_ENABLED }}
        run: bash .wp-plugin-base/scripts/ci/validate_wordpress_readiness.sh ".wp-plugin-base.env" "$BRANCH_NAME"
