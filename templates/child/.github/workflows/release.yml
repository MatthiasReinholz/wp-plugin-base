name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing release tag in x.y.z format'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pull-requests: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: read
      attestations: write
      id-token: write
    environment: __PRODUCTION_ENVIRONMENT__
    env:
      WP_ORG_DEPLOY_ENABLED: ${{ vars.WP_ORG_DEPLOY_ENABLED }}
      WOOCOMMERCE_COM_DEPLOY_ENABLED: ${{ vars.WOOCOMMERCE_COM_DEPLOY_ENABLED }}
      WP_PLUGIN_BASE_ALLOW_WPORG_TAG_REDEPLOY: ${{ vars.WP_PLUGIN_BASE_ALLOW_WPORG_TAG_REDEPLOY }}

    steps:
      - name: Validate target version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"

          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use x.y.z format." >&2
            exit 1
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Verify target tag exists on origin
        env:
          REPOSITORY_GIT_URL: ${{ github.server_url }}/${{ github.repository }}.git
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          if ! git ls-remote --exit-code --tags "$REPOSITORY_GIT_URL" "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Release tag ${VERSION} does not exist on origin." >&2
            exit 1
          fi

      - name: Checkout existing tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: refs/tags/${{ steps.version.outputs.value }}
          fetch-depth: 0

      - name: Verify release tag is annotated
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          git fetch --tags origin
          if [ "$(git cat-file -t "refs/tags/$VERSION")" != "tag" ]; then
            echo "Tag $VERSION exists but is not an annotated tag." >&2
            exit 1
          fi

      - name: Verify release tag comes from a merged release PR
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          COMMIT_SHA="$(git rev-parse HEAD)"
          response="$(
            curl -fsSL \
              --connect-timeout 10 \
              --max-time 60 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/${COMMIT_SHA}/pulls"
          )"
          match_count="$(
            jq --arg version "$VERSION" --arg sha "$COMMIT_SHA" '
              map(
                select(
                  .merged_at != null and
                  .base.ref == "main" and
                  (.head.ref == ("release/" + $version) or .head.ref == ("hotfix/" + $version)) and
                  .merge_commit_sha == $sha
                )
              ) | length
            ' <<<"$response"
          )"
          if [ "$match_count" -lt 1 ]; then
            echo "Commit ${COMMIT_SHA} is not the merge commit of a merged release or hotfix PR for version ${VERSION}." >&2
            exit 1
          fi

      - name: Read config
        id: config
        shell: bash
        run: bash .wp-plugin-base/scripts/ci/write_config_outputs.sh project ".wp-plugin-base.env" "$GITHUB_OUTPUT"

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: ${{ steps.config.outputs.php_version }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ steps.config.outputs.node_version }}

      - name: Validate WordPress readiness
        if: ${{ steps.config.outputs.wordpress_readiness_enabled == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          WP_PLUGIN_BASE_STRICT_DEPLOY_ENV_PROTECTION: 'true'
          WP_ORG_DEPLOY_ENABLED: ${{ env.WP_ORG_DEPLOY_ENABLED }}
        run: bash .wp-plugin-base/scripts/ci/validate_wordpress_readiness.sh ".wp-plugin-base.env"

      - name: Validate tag and metadata versions
        if: ${{ steps.config.outputs.wordpress_readiness_enabled != 'true' }}
        run: bash .wp-plugin-base/scripts/ci/check_versions.sh "${{ steps.version.outputs.value }}"

      - name: Lint PHP
        if: ${{ steps.config.outputs.wordpress_readiness_enabled != 'true' }}
        run: bash .wp-plugin-base/scripts/ci/lint_php.sh

      - name: Lint JavaScript
        if: ${{ steps.config.outputs.wordpress_readiness_enabled != 'true' }}
        run: bash .wp-plugin-base/scripts/ci/lint_js.sh

      - name: Build package
        if: ${{ steps.config.outputs.wordpress_readiness_enabled != 'true' }}
        run: bash .wp-plugin-base/scripts/ci/build_zip.sh

      - name: Generate GitHub release body
        run: bash .wp-plugin-base/scripts/release/generate_github_release_body.sh "${{ steps.version.outputs.value }}" > dist/release-body.md

      - name: Install SBOM and signing tools
        run: |
          bash .wp-plugin-base/scripts/release/install_release_security_tools.sh "$RUNNER_TEMP/wp-plugin-base-release-tools"
          echo "$RUNNER_TEMP/wp-plugin-base-release-tools" >> "$GITHUB_PATH"

      - name: Generate package SBOM
        run: |
          bash .wp-plugin-base/scripts/release/generate_sbom.sh \
            "dist/package/${{ steps.config.outputs.plugin_slug }}" \
            "dist/${{ steps.config.outputs.zip_file }}.sbom.cdx.json"

      - name: Sign release package
        run: |
          bash .wp-plugin-base/scripts/release/sign_release.sh \
            "dist/${{ steps.config.outputs.zip_file }}" \
            "dist/${{ steps.config.outputs.zip_file }}.sigstore.json"

      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ steps.config.outputs.plugin_slug }}-${{ steps.version.outputs.value }}
          path: dist/${{ steps.config.outputs.zip_file }}
          if-no-files-found: error

      - name: Attest package provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist/${{ steps.config.outputs.zip_file }}

      - name: Validate WordPress.org deploy configuration
        if: ${{ env.WP_ORG_DEPLOY_ENABLED == 'true' && env.WP_PLUGIN_BASE_ALLOW_WPORG_TAG_REDEPLOY == 'true' }}
        run: bash .wp-plugin-base/scripts/release/validate_wordpress_org_deploy.sh "${{ steps.version.outputs.value }}" ".wp-plugin-base.env" "dist/package/${{ steps.config.outputs.plugin_slug }}"

      - name: Validate WooCommerce.com deploy configuration
        if: ${{ env.WOOCOMMERCE_COM_DEPLOY_ENABLED == 'true' }}
        env:
          WOO_COM_USERNAME: ${{ secrets.WOO_COM_USERNAME }}
          WOO_COM_APP_PASSWORD: ${{ secrets.WOO_COM_APP_PASSWORD }}
        run: bash .wp-plugin-base/scripts/release/validate_woocommerce_com_deploy.sh "${{ steps.version.outputs.value }}" ".wp-plugin-base.env" "dist/package/${{ steps.config.outputs.plugin_slug }}"

      - name: Report skipped WordPress.org redeploy
        if: ${{ env.WP_ORG_DEPLOY_ENABLED == 'true' && env.WP_PLUGIN_BASE_ALLOW_WPORG_TAG_REDEPLOY != 'true' }}
        run: echo "Manual release recovery skips WordPress.org redeploy unless WP_PLUGIN_BASE_ALLOW_WPORG_TAG_REDEPLOY=true is set for an intentional repair of the latest repository release tag."

      - name: Install Subversion
        if: ${{ env.WP_ORG_DEPLOY_ENABLED == 'true' && env.WP_PLUGIN_BASE_ALLOW_WPORG_TAG_REDEPLOY == 'true' }}
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Deploy to WordPress.org
        if: ${{ env.WP_ORG_DEPLOY_ENABLED == 'true' && env.WP_PLUGIN_BASE_ALLOW_WPORG_TAG_REDEPLOY == 'true' }}
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
        run: |
          bash .wp-plugin-base/scripts/release/deploy_wordpress_org.sh \
            "${{ steps.version.outputs.value }}" \
            ".wp-plugin-base.env" \
            "dist/package/${{ steps.config.outputs.plugin_slug }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash .wp-plugin-base/scripts/release/publish_github_release.sh --repair \
            "${{ steps.version.outputs.value }}" \
            "${{ steps.version.outputs.value }}" \
            dist/release-body.md \
            "dist/${{ steps.config.outputs.zip_file }}" \
            "dist/${{ steps.config.outputs.zip_file }}.sbom.cdx.json" \
            "dist/${{ steps.config.outputs.zip_file }}.sigstore.json"

      - name: Verify GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
          ZIP_FILE: ${{ steps.config.outputs.zip_file }}
        run: |
          set -euo pipefail
          bash .wp-plugin-base/scripts/release/verify_github_release_assets.sh \
            "$VERSION" \
            false \
            "dist/${ZIP_FILE}" \
            "dist/${ZIP_FILE}.sbom.cdx.json" \
            "dist/${ZIP_FILE}.sigstore.json"

      - name: Deploy to WooCommerce.com Marketplace
        if: ${{ env.WOOCOMMERCE_COM_DEPLOY_ENABLED == 'true' && steps.config.outputs.woocommerce_com_product_id != '' }}
        env:
          WOO_COM_USERNAME: ${{ secrets.WOO_COM_USERNAME }}
          WOO_COM_APP_PASSWORD: ${{ secrets.WOO_COM_APP_PASSWORD }}
          WP_PLUGIN_BASE_REPAIR_MODE: 'true'
        run: |
          bash .wp-plugin-base/scripts/release/deploy_woocommerce_com.sh \
            "${{ steps.version.outputs.value }}" \
            ".wp-plugin-base.env" \
            "dist/${{ steps.config.outputs.zip_file }}"
