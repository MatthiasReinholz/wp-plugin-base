name: reusable-update-foundation

on:
  workflow_call:
    inputs:
      config_path:
        required: false
        type: string
        default: .wp-plugin-base.env
    secrets:
      GITLAB_TOKEN:
        required: false
      WP_PLUGIN_BASE_PR_TOKEN:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: update-foundation-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    name: Update foundation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Read config
        id: config
        shell: bash
        run: bash .wp-plugin-base/scripts/ci/write_config_outputs.sh foundation "${{ inputs.config_path }}" "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add foundation remote
        run: |
          source scripts/lib/provider.sh
          git remote remove foundation >/dev/null 2>&1 || true
          git remote add foundation "$(wp_plugin_base_provider_reference_git_url "${{ steps.config.outputs.release_source_provider }}" "${{ steps.config.outputs.release_source_api_base }}" "${{ steps.config.outputs.release_source_reference }}")"

      - name: Resolve latest compatible released version
        id: latest
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          bash scripts/update/resolve_latest_foundation_version.sh \
            "${{ steps.config.outputs.version }}" \
            "${{ steps.config.outputs.release_source_reference }}" \
            "$GITHUB_OUTPUT" \
            "${{ steps.config.outputs.release_source_provider }}" \
            "${{ steps.config.outputs.release_source_api_base }}"

      - name: Install release security tools
        if: ${{ steps.latest.outputs.update_needed == 'true' }}
        run: |
          bash scripts/release/install_release_security_tools.sh "$RUNNER_TEMP/wp-plugin-base-release-tools"
          echo "$RUNNER_TEMP/wp-plugin-base-release-tools" >> "$GITHUB_PATH"

      - name: Verify foundation release provenance
        id: verify
        if: ${{ steps.latest.outputs.update_needed == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          set -euo pipefail
          while IFS= read -r candidate_version; do
            [ -n "$candidate_version" ] || continue
            verify_output="$(mktemp)"
            verify_log="$(mktemp)"
            if bash scripts/update/verify_foundation_release.sh \
              "${{ steps.config.outputs.release_source_reference }}" \
              "$candidate_version" \
              "$verify_output" \
              "${{ steps.config.outputs.release_source_provider }}" \
              "${{ steps.config.outputs.release_source_api_base }}" \
              "${{ steps.config.outputs.release_source_sigstore_issuer }}" >"$verify_log" 2>&1; then
              cat "$verify_output" >> "$GITHUB_OUTPUT"
              rm -f "$verify_output" "$verify_log"
              exit 0
            fi
            cat "$verify_log" >&2
            rm -f "$verify_output" "$verify_log"
          done <<'EOF'
          ${{ steps.latest.outputs.candidates }}
          EOF

          echo "No compatible foundation release passed provenance verification." >&2
          exit 1

      - name: Clone target foundation version
        if: ${{ steps.latest.outputs.update_needed == 'true' }}
        run: |
          rm -rf "$RUNNER_TEMP/wp-plugin-base"
          git init "$RUNNER_TEMP/wp-plugin-base"
          git -C "$RUNNER_TEMP/wp-plugin-base" remote add origin "$(git remote get-url foundation)"
          git -C "$RUNNER_TEMP/wp-plugin-base" fetch --depth 1 origin "${{ steps.verify.outputs.commit_sha }}"
          git -C "$RUNNER_TEMP/wp-plugin-base" checkout --detach FETCH_HEAD

      - name: Refresh vendored foundation directory
        if: ${{ steps.latest.outputs.update_needed == 'true' }}
        run: |
          rm -rf .wp-plugin-base
          mkdir -p .wp-plugin-base
          rsync -a --exclude '.git' "$RUNNER_TEMP/wp-plugin-base/" .wp-plugin-base/

      - name: Update repo config
        if: ${{ steps.latest.outputs.update_needed == 'true' }}
        run: |
          perl -0pi -e "s/^FOUNDATION_VERSION=.*/FOUNDATION_VERSION=${{ steps.verify.outputs.version }}/m" "${{ inputs.config_path }}"

      - name: Regenerate managed files
        if: ${{ steps.latest.outputs.update_needed == 'true' }}
        run: bash .wp-plugin-base/scripts/update/sync_child_repo.sh "${{ inputs.config_path }}"

      - name: Validate updated child repository
        if: ${{ steps.latest.outputs.update_needed == 'true' }}
        run: bash .wp-plugin-base/scripts/ci/validate_project.sh "${{ inputs.config_path }}"

      - name: Resolve managed staging paths
        id: managed-paths
        if: ${{ steps.latest.outputs.update_needed == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          managed_paths="$(
            {
              printf '%s\n' ".wp-plugin-base"
              printf '%s\n' "${{ inputs.config_path }}"
              bash .wp-plugin-base/scripts/ci/list_managed_files.sh --mode stage "${{ inputs.config_path }}"
            } | awk '!seen[$0]++' | paste -sd, -
          )"
          echo "value=$managed_paths" >> "$GITHUB_OUTPUT"

      - name: Write foundation update pull request body
        if: ${{ steps.latest.outputs.update_needed == 'true' }}
        run: |
          cat > "$RUNNER_TEMP/foundation-update-pr.md" <<'EOF'
          This PR updates the vendored foundation and regenerates the managed workflow and documentation files.

          Updated foundation version:
          - `${{ steps.config.outputs.version }}` -> `${{ steps.verify.outputs.version }}`

          Security checks performed before proposing this update:
          - release is published and supported by the configured foundation source provider
          - tag matches the foundation semver contract
          - signed release metadata matches the authoritative source, version, and commit
          - tag commit is reachable from the foundation `main`
          - release was produced by the protected foundation release flow
          - release author is in the allowed release-author list
          - vendored code is refreshed from the verified commit SHA

          Managed files were regenerated from the new foundation version.
          EOF

      - name: Create foundation update PR
        if: ${{ steps.latest.outputs.update_needed == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.WP_PLUGIN_BASE_PR_TOKEN != '' && secrets.WP_PLUGIN_BASE_PR_TOKEN || github.token }}
          GIT_ADD_PATHS: ${{ steps.managed-paths.outputs.value }}
        run: |
          bash scripts/update/create_or_update_pr.sh \
            "chore/update-wp-plugin-base-${{ steps.verify.outputs.version }}" \
            "main" \
            "chore: update wp-plugin-base to ${{ steps.verify.outputs.version }}" \
            "chore: update wp-plugin-base to ${{ steps.verify.outputs.version }}" \
            "$RUNNER_TEMP/foundation-update-pr.md"

      - name: Report no update needed
        if: ${{ steps.latest.outputs.update_needed != 'true' }}
        run: echo "No compatible foundation update found."
