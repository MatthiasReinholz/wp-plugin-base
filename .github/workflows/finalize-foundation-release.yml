name: finalize-foundation-release

on:
  pull_request_target:
    types:
      - closed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

concurrency:
  group: finalize-foundation-release-${{ github.repository }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish merged foundation release
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (startsWith(github.event.pull_request.head.ref, 'release/') || startsWith(github.event.pull_request.head.ref, 'hotfix/'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - name: Derive release version
        id: release
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [[ "$HEAD_REF" =~ ^(release|hotfix)/(v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "version=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Unsupported foundation release branch: $HEAD_REF" >&2
          exit 1

      - name: Checkout protected default branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main
          fetch-depth: 0

      - name: Verify merged commit is reachable from main
        env:
          EXPECTED_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          git fetch --unshallow origin main || git fetch origin main
          if ! git merge-base --is-ancestor "$EXPECTED_COMMIT" origin/main; then
            echo "Merged commit $EXPECTED_COMMIT is not reachable from origin/main." >&2
            exit 1
          fi
          git checkout --detach "$EXPECTED_COMMIT"

      - name: Validate foundation version metadata
        run: bash scripts/foundation/check_version.sh "${{ steps.release.outputs.version }}"

      - name: Validate version contract surfaces
        run: bash scripts/foundation/check_version_contract_surfaces.sh "${{ steps.release.outputs.version }}"

      - name: Generate GitHub release body
        run: bash scripts/foundation/generate_github_release_body.sh "${{ steps.release.outputs.version }}" > dist-foundation-release.md

      - name: Create foundation release metadata asset
        run: |
          bash scripts/foundation/write_release_metadata.sh \
            "${{ steps.release.outputs.version }}" \
            "$(git rev-parse HEAD)" \
            dist-foundation-release.json \
            github-release \
            "${GITHUB_REPOSITORY}" \
            https://api.github.com

      - name: Install SBOM and signing tools
        run: |
          bash scripts/release/install_release_security_tools.sh "$RUNNER_TEMP/wp-plugin-base-release-tools"
          echo "$RUNNER_TEMP/wp-plugin-base-release-tools" >> "$GITHUB_PATH"

      - name: Generate foundation SBOM
        run: bash scripts/release/generate_sbom.sh "." dist-foundation-release.sbom.cdx.json

      - name: Sign foundation release metadata
        run: bash scripts/release/sign_release.sh dist-foundation-release.json dist-foundation-release.json.sigstore.json

      - name: Inspect foundation release tag state
        id: tag
        env:
          VERSION: ${{ steps.release.outputs.version }}
          EXPECTED_COMMIT: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          set -euo pipefail
          git fetch --tags origin
          if ! git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$(git cat-file -t "refs/tags/${VERSION}")" != "tag" ]; then
            echo "Tag ${VERSION} already exists but is not an annotated tag." >&2
            exit 1
          fi

          tag_commit="$(git rev-list -n 1 "${VERSION}")"
          if [ "$tag_commit" != "$EXPECTED_COMMIT" ]; then
            echo "Tag ${VERSION} already exists on ${tag_commit}, expected ${EXPECTED_COMMIT}." >&2
            exit 1
          fi

          echo "exists=true" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create annotated tag locally
        if: ${{ steps.tag.outputs.exists != 'true' }}
        run: git -c tag.gpgsign=false tag -a "${{ steps.release.outputs.version }}" -m "Foundation release ${{ steps.release.outputs.version }}"

      - name: Push tag
        if: ${{ steps.tag.outputs.exists != 'true' }}
        run: git push origin "${{ steps.release.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          repair_args=()
          if [ "${{ steps.tag.outputs.exists }}" = "true" ]; then
            repair_args+=(--repair)
          fi
          bash scripts/release/publish_github_release.sh \
            "${repair_args[@]}" \
            "${{ steps.release.outputs.version }}" \
            "${{ steps.release.outputs.version }}" \
            dist-foundation-release.md \
            dist-foundation-release.json \
            dist-foundation-release.sbom.cdx.json \
            dist-foundation-release.json.sigstore.json

      - name: Verify GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" \
            --json isDraft,isPrerelease,assets \
            --jq '
              if .isDraft then error("release is still a draft") else . end
              | if .isPrerelease then error("foundation release was marked prerelease") else . end
              | if ([.assets[] | select(.name == "dist-foundation-release.json" and .size > 0)] | length) != 1 then error("missing foundation metadata asset") else . end
              | if ([.assets[] | select(.name == "dist-foundation-release.sbom.cdx.json" and .size > 0)] | length) != 1 then error("missing foundation SBOM asset") else . end
              | if ([.assets[] | select(.name == "dist-foundation-release.json.sigstore.json" and .size > 0)] | length) != 1 then error("missing foundation Sigstore asset") else "verified" end
            '

      - name: Attest foundation release metadata
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist-foundation-release.json
