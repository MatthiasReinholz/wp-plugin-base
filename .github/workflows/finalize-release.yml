name: reusable-finalize-release

on:
  workflow_call:
    inputs:
      config_path:
        required: false
        type: string
        default: .wp-plugin-base.env
      production_environment:
        required: false
        type: string
        default: production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    name: Publish merged release
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      (startsWith(github.event.pull_request.head.ref, 'release/') || startsWith(github.event.pull_request.head.ref, 'hotfix/'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.production_environment }}
    env:
      WP_ORG_DEPLOY_ENABLED: ${{ vars.WP_ORG_DEPLOY_ENABLED }}

    steps:
      - name: Derive release version
        id: release
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [[ "$HEAD_REF" =~ ^(release|hotfix)/([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "version=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Unsupported release branch: $HEAD_REF" >&2
          exit 1

      - name: Checkout merge commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Read config
        id: config
        shell: bash
        run: bash .wp-plugin-base/scripts/ci/write_config_outputs.sh project "${{ inputs.config_path }}" "$GITHUB_OUTPUT"

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: ${{ steps.config.outputs.php_version }}

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ steps.config.outputs.node_version }}

      - name: Validate WordPress readiness
        if: ${{ steps.config.outputs.wordpress_readiness_enabled == 'true' }}
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          GH_TOKEN: ${{ github.token }}
          WP_ORG_DEPLOY_ENABLED: ${{ env.WP_ORG_DEPLOY_ENABLED }}
        run: bash .wp-plugin-base/scripts/ci/validate_wordpress_readiness.sh "${{ inputs.config_path }}" "$BRANCH_NAME"

      - name: Validate metadata versions
        if: ${{ steps.config.outputs.wordpress_readiness_enabled != 'true' }}
        run: bash .wp-plugin-base/scripts/ci/check_versions.sh "${{ steps.release.outputs.version }}" "${{ inputs.config_path }}"

      - name: Lint PHP
        if: ${{ steps.config.outputs.wordpress_readiness_enabled != 'true' }}
        run: bash .wp-plugin-base/scripts/ci/lint_php.sh "${{ inputs.config_path }}"

      - name: Lint JavaScript
        if: ${{ steps.config.outputs.wordpress_readiness_enabled != 'true' }}
        run: bash .wp-plugin-base/scripts/ci/lint_js.sh "${{ inputs.config_path }}"

      - name: Build package
        if: ${{ steps.config.outputs.wordpress_readiness_enabled != 'true' }}
        run: bash .wp-plugin-base/scripts/ci/build_zip.sh "${{ inputs.config_path }}"

      - name: Generate GitHub release body
        run: bash .wp-plugin-base/scripts/release/generate_github_release_body.sh "${{ steps.release.outputs.version }}" "${{ inputs.config_path }}" > dist/release-body.md

      - name: Install SBOM and signing tools
        run: |
          bash .wp-plugin-base/scripts/release/install_release_security_tools.sh "$RUNNER_TEMP/wp-plugin-base-release-tools"
          echo "$RUNNER_TEMP/wp-plugin-base-release-tools" >> "$GITHUB_PATH"

      - name: Generate package SBOM
        run: |
          bash .wp-plugin-base/scripts/release/generate_sbom.sh \
            "dist/package/${{ steps.config.outputs.plugin_slug }}" \
            "dist/${{ steps.config.outputs.zip_file }}.sbom.cdx.json"

      - name: Sign release package
        run: |
          bash .wp-plugin-base/scripts/release/sign_release.sh \
            "dist/${{ steps.config.outputs.zip_file }}" \
            "dist/${{ steps.config.outputs.zip_file }}.sigstore.json"

      - name: Upload package artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ steps.config.outputs.plugin_slug }}-${{ steps.release.outputs.version }}
          path: dist/${{ steps.config.outputs.zip_file }}
          if-no-files-found: error

      - name: Attest package provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist/${{ steps.config.outputs.zip_file }}

      - name: Validate WordPress.org deploy configuration
        if: ${{ env.WP_ORG_DEPLOY_ENABLED == 'true' }}
        run: bash .wp-plugin-base/scripts/release/validate_wordpress_org_deploy.sh "${{ steps.release.outputs.version }}" "${{ inputs.config_path }}" "dist/package/${{ steps.config.outputs.plugin_slug }}"

      - name: Ensure tag does not already exist
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists." >&2
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create annotated tag locally
        run: git -c tag.gpgsign=false tag -a "${{ steps.release.outputs.version }}" -m "Release ${{ steps.release.outputs.version }}"

      - name: Push tag
        run: git push origin "${{ steps.release.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash .wp-plugin-base/scripts/release/publish_github_release.sh \
            "${{ steps.release.outputs.version }}" \
            "${{ steps.release.outputs.version }}" \
            dist/release-body.md \
            "dist/${{ steps.config.outputs.zip_file }}" \
            "dist/${{ steps.config.outputs.zip_file }}.sbom.cdx.json" \
            "dist/${{ steps.config.outputs.zip_file }}.sigstore.json"

      - name: Install Subversion
        if: ${{ env.WP_ORG_DEPLOY_ENABLED == 'true' }}
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Deploy to WordPress.org
        if: ${{ env.WP_ORG_DEPLOY_ENABLED == 'true' }}
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
        run: |
          bash .wp-plugin-base/scripts/release/deploy_wordpress_org.sh \
            "${{ steps.release.outputs.version }}" \
            "${{ inputs.config_path }}" \
            "dist/package/${{ steps.config.outputs.plugin_slug }}"
