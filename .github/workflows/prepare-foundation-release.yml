name: prepare-foundation-release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'How to derive the next foundation release version'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      version:
        description: 'Foundation release version in vX.Y.Z format when release type is custom'
        required: false
        type: string
      base_ref:
        description: 'Base branch for the release branch'
        required: true
        default: 'main'
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: prepare-foundation-release-${{ inputs.base_ref }}-${{ inputs.release_type }}-${{ inputs.version || 'auto' }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare foundation release branch
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Validate base ref
        env:
          BASE_REF: ${{ inputs.base_ref }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! [[ "$BASE_REF" =~ ^[A-Za-z0-9][A-Za-z0-9._/-]*$ ]] ||
            [[ "$BASE_REF" == refs/* ]] ||
            [[ "$BASE_REF" == pull/* ]] ||
            [[ "$BASE_REF" == *'/pull/'* ]] ||
            [[ "$BASE_REF" == *..* ]] ||
            [[ "$BASE_REF" == *"//"* ]]; then
            echo "Unsupported release base ref: $BASE_REF" >&2
            exit 1
          fi

          if [ "$BASE_REF" != "main" ]; then
            encoded_ref="$(jq -nr --arg value "$BASE_REF" '$value|@uri')"
            protected="$(gh api "repos/${GITHUB_REPOSITORY}/branches/${encoded_ref}" --jq '.protected')"
            if [ "$protected" != "true" ]; then
              echo "Release base ref $BASE_REF must be main or a protected branch." >&2
              exit 1
            fi
          fi

      - name: Checkout base ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ inputs.base_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve target version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.release_type }}" = "custom" ]; then
            if ! [[ "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Custom version must use vX.Y.Z format." >&2
              exit 1
            fi

            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="$(bash scripts/foundation/next_version.sh "${{ inputs.release_type }}")"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Resolve source ref
        id: source
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BRANCH: release/${{ steps.version.outputs.value }}
        run: |
          bash scripts/update/resolve_release_branch_source.sh \
            "${GITHUB_REPOSITORY}" \
            "${GITHUB_REPOSITORY_OWNER}" \
            "$RELEASE_BRANCH" \
            "${{ inputs.base_ref }}" \
            "$GITHUB_OUTPUT"

      - name: Checkout source ref
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ steps.source.outputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Bump foundation version metadata
        run: bash scripts/foundation/bump_version.sh "${{ steps.version.outputs.value }}"

      - name: Validate release version contracts
        run: |
          bash scripts/foundation/check_version.sh "${{ steps.version.outputs.value }}"
          bash scripts/foundation/check_version_contract_surfaces.sh "${{ steps.version.outputs.value }}"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Write release pull request body
        run: |
          cat > "$RUNNER_TEMP/foundation-release-pr.md" <<'EOF'
          This PR was created by the `prepare-foundation-release` workflow.

          Included changes:
          - bump `VERSION` to `${{ steps.version.outputs.value }}`
          - add generated release notes to `CHANGELOG.md`
          - prepare the repository for the foundation release tag

          Automated checks on this PR:
          - foundation version metadata consistency
          - workflow/action allowlist and permission audit
          - fixture validation for standard and nonstandard plugin layouts
          - child project sync validation

          After merge:
          - the `finalize-foundation-release` workflow creates and pushes the annotated `${{ steps.version.outputs.value }}` tag automatically
          - the same `finalize-foundation-release` workflow publishes the GitHub release and emits an attestation for the foundation release metadata asset
          EOF

      - name: Create or update release pull request
        id: cpr
        env:
          GH_TOKEN: ${{ github.token }}
          GIT_ADD_PATHS: VERSION,CHANGELOG.md,templates/child/.wp-plugin-base.env.example
        run: |
          bash scripts/update/create_or_update_pr.sh \
            "release/${{ steps.version.outputs.value }}" \
            "${{ inputs.base_ref }}" \
            "Foundation release ${{ steps.version.outputs.value }}" \
            "Foundation release ${{ steps.version.outputs.value }}" \
            "$RUNNER_TEMP/foundation-release-pr.md"

      - name: Report prepare-foundation-release outcome
        env:
          BRANCH_EXISTS: ${{ steps.source.outputs.branch_exists }}
          OPEN_PR_EXISTS: ${{ steps.source.outputs.open_pr_exists }}
          PULL_REQUEST_NUMBER: ${{ steps.cpr.outputs.pull_request_number }}
          PULL_REQUEST_OPERATION: ${{ steps.cpr.outputs.pull_request_operation }}
          PULL_REQUEST_URL: ${{ steps.cpr.outputs.pull_request_url }}
          RELEASE_BRANCH: release/${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          if [ -n "$PULL_REQUEST_NUMBER" ]; then
            echo "Foundation release branch $RELEASE_BRANCH is ready."
            echo "PR #$PULL_REQUEST_NUMBER ($PULL_REQUEST_OPERATION): $PULL_REQUEST_URL"
            exit 0
          fi

          if [ "$BRANCH_EXISTS" = "true" ] && [ "$OPEN_PR_EXISTS" = "true" ]; then
            echo "Foundation release branch $RELEASE_BRANCH already existed and no additional PR update was required."
          else
            echo "Foundation release branch $RELEASE_BRANCH was prepared, but no pull request was created. Check the create_or_update_pr step output." >&2
            exit 1
          fi
