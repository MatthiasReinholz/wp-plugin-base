name: update-external-dependencies

on:
  schedule:
    - cron: '17 5 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: update-external-dependencies-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    name: Update external dependency (${{ matrix.dependency_id }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        dependency_id:
          - plugin-update-checker-runtime
          - plugin-check
          - composer-docker-image
          - shellcheck-binary
          - actionlint-binary
          - editorconfig-checker-binary
          - gitleaks-binary
          - syft-binary
          - cosign-binary

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare dependency update
        id: prepare
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          bash scripts/update/prepare_external_dependency_update.sh \
            "${{ matrix.dependency_id }}" \
            "$GITHUB_OUTPUT"

      - name: Install foundation assurance tools
        if: ${{ steps.prepare.outputs.update_needed == 'true' }}
        run: |
          bash scripts/ci/install_lint_tools.sh "$RUNNER_TEMP/wp-plugin-base-tools"
          echo "$RUNNER_TEMP/wp-plugin-base-tools" >> "$GITHUB_PATH"

      - name: Validate updated foundation state
        if: ${{ steps.prepare.outputs.update_needed == 'true' }}
        run: bash scripts/foundation/validate.sh --mode ci

      - name: Create dependency update PR
        if: ${{ steps.prepare.outputs.update_needed == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.WP_PLUGIN_BASE_PR_TOKEN != '' && secrets.WP_PLUGIN_BASE_PR_TOKEN || github.token }}
          GIT_ADD_PATHS: ${{ steps.prepare.outputs.git_add_paths }}
        run: |
          bash scripts/update/create_or_update_pr.sh \
            "${{ steps.prepare.outputs.branch_name }}" \
            "main" \
            "${{ steps.prepare.outputs.pr_title }}" \
            "${{ steps.prepare.outputs.commit_message }}" \
            "${{ steps.prepare.outputs.pr_body_file }}"

      - name: Report no update needed
        if: ${{ steps.prepare.outputs.update_needed != 'true' }}
        run: echo "No compatible update found for ${{ matrix.dependency_id }}."
