name: foundation-ci

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate:
    name: Validate foundation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.1'

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'

      - name: Check shell syntax
        run: |
          while IFS= read -r file; do
            bash -n "$file"
          done < <(find scripts -name '*.sh' -print | sort)

      - name: Validate foundation release metadata
        run: |
          set -euo pipefail
          bash scripts/foundation/check_version.sh
          bash scripts/foundation/check_release_branch.sh "release/$(tr -d '\n' < VERSION)"

      - name: Validate standard fixture
        run: |
          set -euo pipefail
          fixture="$RUNNER_TEMP/standard-plugin"
          cp -R tests/fixtures/standard-plugin "$fixture"
          WP_PLUGIN_BASE_ROOT="$fixture" bash scripts/ci/check_versions.sh
          WP_PLUGIN_BASE_ROOT="$fixture" bash scripts/ci/check_release_branch.sh release/1.2.3
          WP_PLUGIN_BASE_ROOT="$fixture" bash scripts/ci/lint_php.sh
          WP_PLUGIN_BASE_ROOT="$fixture" bash scripts/ci/lint_js.sh
          WP_PLUGIN_BASE_ROOT="$fixture" bash scripts/ci/build_zip.sh
          WP_PLUGIN_BASE_ROOT="$fixture" bash scripts/release/generate_github_release_body.sh 1.2.3 > "$fixture/dist/release-body.md"

      - name: Validate nonstandard fixture
        run: |
          set -euo pipefail
          fixture="$RUNNER_TEMP/nonstandard-plugin"
          cp -R tests/fixtures/nonstandard-plugin "$fixture"
          WP_PLUGIN_BASE_ROOT="$fixture" bash scripts/ci/check_versions.sh
          WP_PLUGIN_BASE_ROOT="$fixture" bash scripts/ci/check_release_branch.sh release/2.4.6
          WP_PLUGIN_BASE_ROOT="$fixture" bash scripts/ci/lint_php.sh
          WP_PLUGIN_BASE_ROOT="$fixture" bash scripts/ci/lint_js.sh
          WP_PLUGIN_BASE_ROOT="$fixture" bash scripts/ci/build_zip.sh
          WP_PLUGIN_BASE_ROOT="$fixture" bash scripts/release/generate_github_release_body.sh 2.4.6 > "$fixture/dist/release-body.md"

      - name: Validate child sync
        run: |
          set -euo pipefail
          fixture="$RUNNER_TEMP/managed-child"
          mkdir -p "$fixture/.wp-plugin-base"
          cp -R tests/fixtures/standard-plugin/. "$fixture/"
          rsync -a ./ "$fixture/.wp-plugin-base/"
          WP_PLUGIN_BASE_ROOT="$fixture" bash "$fixture/.wp-plugin-base/scripts/update/sync_child_repo.sh"
          test -f "$fixture/.github/workflows/ci.yml"
          test -f "$fixture/CONTRIBUTING.md"
