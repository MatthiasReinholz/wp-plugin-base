name: foundation-ci

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: foundation-ci-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate foundation (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.1'
          - '8.2'
          - '8.3'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: ${{ matrix.php-version }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'

      - name: Install foundation lint and security tools
        run: |
          bash scripts/ci/install_lint_tools.sh "$RUNNER_TEMP/wp-plugin-base-tools"
          echo "$RUNNER_TEMP/wp-plugin-base-tools" >> "$GITHUB_PATH"

      - name: Validate foundation
        env:
          WP_PLUGIN_BASE_STRICT_LINTERS: 'true'
        run: bash scripts/foundation/validate.sh --mode ci

  validate-strict-local-bootstrap:
    name: Validate strict-local bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.2'

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'

      - name: Bootstrap strict-local foundation tools
        run: |
          bash scripts/foundation/bootstrap_strict_local.sh "$RUNNER_TEMP/wp-plugin-base-tools"
          echo "$RUNNER_TEMP/wp-plugin-base-tools" >> "$GITHUB_PATH"

      - name: Validate foundation strict-local mode
        env:
          WP_PLUGIN_BASE_STRICT_LINTERS: 'true'
        run: bash scripts/foundation/validate.sh --mode strict-local

  validate-full:
    name: Validate full foundation suite (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.1'
          - '8.2'
          - '8.3'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: ${{ matrix.php-version }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'

      - name: Install foundation lint and security tools
        run: |
          bash scripts/ci/install_lint_tools.sh "$RUNNER_TEMP/wp-plugin-base-tools"
          echo "$RUNNER_TEMP/wp-plugin-base-tools" >> "$GITHUB_PATH"

      - name: Validate full foundation
        env:
          WP_PLUGIN_BASE_STRICT_LINTERS: 'true'
          WP_PLUGIN_BASE_SKIP_FAST_VALIDATE: 'true'
        run: bash scripts/foundation/validate-full.sh --mode ci

  release-security-smoke:
    name: Release security smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.1'

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'

      - name: Install release security tools
        run: |
          bash scripts/release/install_release_security_tools.sh "$RUNNER_TEMP/wp-plugin-base-release-tools"
          echo "$RUNNER_TEMP/wp-plugin-base-release-tools" >> "$GITHUB_PATH"

      - name: Run release security smoke
        run: bash scripts/foundation/run_release_security_smoke.sh --mode ci
