name: reusable-ci

on:
  workflow_call:
    inputs:
      config_path:
        required: false
        type: string
        default: .wp-plugin-base.env

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Read config
        id: config
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source "${{ inputs.config_path }}"
          set +a
          : "${PLUGIN_SLUG:?PLUGIN_SLUG is required}"
          : "${ZIP_FILE:?ZIP_FILE is required}"
          : "${PHP_VERSION:?PHP_VERSION is required}"
          : "${NODE_VERSION:?NODE_VERSION is required}"
          echo "plugin_slug=${PLUGIN_SLUG}" >> "$GITHUB_OUTPUT"
          echo "zip_file=${ZIP_FILE}" >> "$GITHUB_OUTPUT"
          echo "php_version=${PHP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "node_version=${NODE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: ${{ steps.config.outputs.php_version }}

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: ${{ steps.config.outputs.node_version }}

      - name: Lint PHP
        run: bash .wp-plugin-base/scripts/ci/lint_php.sh "${{ inputs.config_path }}"

      - name: Lint JavaScript
        run: bash .wp-plugin-base/scripts/ci/lint_js.sh "${{ inputs.config_path }}"

      - name: Verify version metadata
        run: bash .wp-plugin-base/scripts/ci/check_versions.sh "" "${{ inputs.config_path }}"

      - name: Validate release branch metadata
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: bash .wp-plugin-base/scripts/ci/check_release_branch.sh "$BRANCH_NAME" "${{ inputs.config_path }}"

      - name: Build package
        run: bash .wp-plugin-base/scripts/ci/build_zip.sh "${{ inputs.config_path }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ steps.config.outputs.plugin_slug }}-package
          path: dist/${{ steps.config.outputs.zip_file }}
          if-no-files-found: error
