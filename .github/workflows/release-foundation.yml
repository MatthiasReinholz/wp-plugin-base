name: release-foundation

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing foundation tag in vX.Y.Z format'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pull-requests: read
  attestations: write
  id-token: write

jobs:
  release:
    name: Release foundation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ inputs.version }}
          fetch-depth: 0

      - name: Validate target version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"

          if ! [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use vX.Y.Z format." >&2
            exit 1
          fi

          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify release tag comes from a merged release PR
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          bash scripts/ci/check_release_pr.sh "${GITHUB_REPOSITORY}" "${{ steps.version.outputs.value }}" "$COMMIT_SHA"

      - name: Validate foundation version metadata
        run: bash scripts/foundation/check_version.sh "${{ steps.version.outputs.value }}"

      - name: Generate GitHub release body
        run: |
          bash scripts/foundation/generate_github_release_body.sh "${{ steps.version.outputs.value }}" > dist-foundation-release.md

      - name: Create foundation release metadata asset
        run: |
          cat > dist-foundation-release.json <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "version": "${{ steps.version.outputs.value }}",
            "commit": "$(git rev-parse HEAD)"
          }
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/release/publish_github_release.sh \
            "${{ steps.version.outputs.value }}" \
            "${{ steps.version.outputs.value }}" \
            dist-foundation-release.md \
            dist-foundation-release.json

      - name: Attest foundation release metadata
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist-foundation-release.json
