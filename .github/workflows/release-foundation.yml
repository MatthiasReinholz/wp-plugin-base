name: release-foundation

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing foundation tag in vX.Y.Z format'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  pull-requests: read

jobs:
  release:
    name: Release foundation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: read
      attestations: write
      id-token: write

    steps:
      - name: Verify target tag exists on origin
        env:
          REPOSITORY_GIT_URL: ${{ github.server_url }}/${{ github.repository }}.git
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if ! git ls-remote --exit-code --tags "$REPOSITORY_GIT_URL" "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Foundation tag ${VERSION} does not exist on origin." >&2
            exit 1
          fi

      - name: Checkout existing tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: refs/tags/${{ inputs.version }}
          fetch-depth: 0

      - name: Verify release tag is annotated
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git fetch --tags origin
          if [ "$(git cat-file -t "refs/tags/$VERSION")" != "tag" ]; then
            echo "Tag $VERSION exists but is not an annotated tag." >&2
            exit 1
          fi

      - name: Validate target version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"

          if ! [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use vX.Y.Z format." >&2
            exit 1
          fi

          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify release tag comes from a merged release PR
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          COMMIT_SHA="$(git rev-parse HEAD)"
          response="$(
            curl -fsSL \
              --connect-timeout 10 \
              --max-time 60 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/commits/${COMMIT_SHA}/pulls"
          )"
          match_count="$(
            jq --arg version "$VERSION" --arg sha "$COMMIT_SHA" '
              map(
                select(
                  .merged_at != null and
                  .base.ref == "main" and
                  (.head.ref == ("release/" + $version) or .head.ref == ("hotfix/" + $version)) and
                  .merge_commit_sha == $sha
                )
              ) | length
            ' <<<"$response"
          )"
          if [ "$match_count" -lt 1 ]; then
            echo "Commit ${COMMIT_SHA} is not the merge commit of a merged release or hotfix PR for version ${VERSION}." >&2
            exit 1
          fi

      - name: Validate foundation version metadata
        run: bash scripts/foundation/check_version.sh "${{ steps.version.outputs.value }}"

      - name: Generate GitHub release body
        run: |
          bash scripts/foundation/generate_github_release_body.sh "${{ steps.version.outputs.value }}" > dist-foundation-release.md

      - name: Create foundation release metadata asset
        run: |
          bash scripts/foundation/write_release_metadata.sh \
            "${{ steps.version.outputs.value }}" \
            "$(git rev-parse HEAD)" \
            dist-foundation-release.json \
            github-release \
            "${GITHUB_REPOSITORY}" \
            https://api.github.com

      - name: Install SBOM and signing tools
        run: |
          bash scripts/release/install_release_security_tools.sh "$RUNNER_TEMP/wp-plugin-base-release-tools"
          echo "$RUNNER_TEMP/wp-plugin-base-release-tools" >> "$GITHUB_PATH"

      - name: Generate foundation SBOM
        run: bash scripts/release/generate_sbom.sh "." dist-foundation-release.sbom.cdx.json

      - name: Sign foundation release metadata
        run: bash scripts/release/sign_release.sh dist-foundation-release.json dist-foundation-release.json.sigstore.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/release/publish_github_release.sh --repair \
            "${{ steps.version.outputs.value }}" \
            "${{ steps.version.outputs.value }}" \
            dist-foundation-release.md \
            dist-foundation-release.json \
            dist-foundation-release.sbom.cdx.json \
            dist-foundation-release.json.sigstore.json

      - name: Verify GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          set -euo pipefail
          bash scripts/release/verify_github_release_assets.sh \
            "$VERSION" \
            false \
            dist-foundation-release.json \
            dist-foundation-release.sbom.cdx.json \
            dist-foundation-release.json.sigstore.json

      - name: Attest foundation release metadata
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist-foundation-release.json
